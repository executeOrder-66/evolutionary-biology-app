<svg width="560" height="135" viewBox="0 0 560 135" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="135" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- title -->
  <text x="280" y="22" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">FAMILY TREE — Each survivor splits into 3 clones (binary fission × 3)</text>

  <!-- parent node (Rusty / blue) -->
  <circle cx="280" cy="50" r="12" fill="#3b82f6"/>
  <text x="280" y="30" font-size="10" fill="#6b7280" text-anchor="middle">Survivor</text>
  <!-- label on parent -->
  <text x="296" y="54" font-size="9" fill="white" font-weight="700">R</text>

  <!-- curved lines to 3 children -->
  <!-- child 1 (left) -->
  <path d="M 280,62 C 280,80 160,80 160,88" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- child 2 (center) -->
  <line x1="280" y1="62" x2="280" y2="88" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <!-- child 3 (right) -->
  <path d="M 280,62 C 280,80 400,80 400,88" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- 3 child nodes -->
  <circle cx="160" cy="101" r="11" fill="#3b82f6" opacity="0.9"/>
  <circle cx="280" cy="101" r="11" fill="#3b82f6" opacity="0.9"/>
  <circle cx="400" cy="101" r="11" fill="#3b82f6" opacity="0.9"/>

  <!-- child labels -->
  <text x="160" y="120" font-size="10" fill="#6b7280" text-anchor="middle">Clone 1</text>
  <text x="280" y="120" font-size="10" fill="#6b7280" text-anchor="middle">Clone 2</text>
  <text x="400" y="120" font-size="10" fill="#6b7280" text-anchor="middle">Clone 3</text>

  <!-- resistance annotation -->
  <rect x="430" y="41" width="116" height="34" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="488" y="56" font-size="9" fill="#1d4ed8" text-anchor="middle">Resistance</text>
  <text x="488" y="68" font-size="9" fill="#1d4ed8" text-anchor="middle">inherited (~0.65)</text>

  <!-- arrow from annotation to children -->
  <line x1="430" y1="75" x2="410" y2="94" stroke="#93c5fd" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
