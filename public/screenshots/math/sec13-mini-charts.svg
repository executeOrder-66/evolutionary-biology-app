<svg width="560" height="132" viewBox="0 0 560 132" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="132" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="280" y="18" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">MINI-CHARTS — Three line charts track key metrics over all generations</text>

  <!-- chart 1: Avg Resistance (climbs after gen 10) -->
  <rect x="12" y="24" width="170" height="100" rx="8" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="97" y="38" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Avg Resistance</text>
  <!-- trend up arrow -->
  <polygon points="153,30 163,30 158,24" fill="#22c55e"/>
  <!-- line chart (climbing after gen 10 midpoint) -->
  <!-- x: 20..170 = 150px; y: 45..110 = 65px; gen 0..50 -->
  <!-- flat 0..10, then climb 10..50 -->
  <polyline
    points="20,100 38,99 56,98 74,97 82,97 89,96 96,93 103,88 110,82 117,76 124,70 131,66 138,63 145,60 152,58 159,57 166,56"
    fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
    transform="translate(0,0)"/>
  <line x1="88" y1="45" x2="88" y2="112" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="90" y="52" font-size="7" fill="#dc2626">Gen 10</text>
  <!-- axes -->
  <line x1="20" y1="112" x2="168" y2="112" stroke="#e5e7eb" stroke-width="1"/>
  <text x="20"  y="122" font-size="8" fill="#9ca3af">Gen 0</text>
  <text x="168" y="122" font-size="8" fill="#9ca3af" text-anchor="end">Gen 50</text>

  <!-- chart 2: Avg Survival Chance (flat, dips at gen 10, recovers) -->
  <rect x="195" y="24" width="170" height="100" rx="8" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="280" y="38" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Avg Survival Chance</text>
  <!-- trend up arrow (currently recovering) -->
  <polygon points="336,30 346,30 341,24" fill="#22c55e"/>
  <!-- line: flat high, sharp dip at gen 10, recovery -->
  <polyline
    points="203,58 221,58 239,57 257,57 271,57 278,58 285,68 292,82 299,94 306,100 313,96 320,88 327,80 334,73 341,68 348,64 362,61"
    fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="271" y1="45" x2="271" y2="112" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="273" y="52" font-size="7" fill="#dc2626">Gen 10</text>
  <!-- axes -->
  <line x1="203" y1="112" x2="363" y2="112" stroke="#e5e7eb" stroke-width="1"/>
  <text x="203" y="122" font-size="8" fill="#9ca3af">Gen 0</text>
  <text x="363" y="122" font-size="8" fill="#9ca3af" text-anchor="end">Gen 50</text>

  <!-- chart 3: Population Size (near 500, dips at gen 10, recovers) -->
  <rect x="378" y="24" width="170" height="100" rx="8" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="463" y="38" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Population Size</text>
  <!-- trend up arrow -->
  <polygon points="519,30 529,30 524,24" fill="#22c55e"/>
  <!-- line: flat near top (498), dips at gen 10, full recovery -->
  <polyline
    points="386,58 404,57 422,57 440,57 454,57 461,58 468,65 475,74 482,80 489,76 496,70 503,64 510,60 517,58 524,58 531,57 545,57"
    fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="454" y1="45" x2="454" y2="112" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="456" y="52" font-size="7" fill="#dc2626">Gen 10</text>
  <!-- axes -->
  <line x1="386" y1="112" x2="546" y2="112" stroke="#e5e7eb" stroke-width="1"/>
  <text x="386" y="122" font-size="8" fill="#9ca3af">Gen 0</text>
  <text x="546" y="122" font-size="8" fill="#9ca3af" text-anchor="end">Gen 50</text>
</svg>
