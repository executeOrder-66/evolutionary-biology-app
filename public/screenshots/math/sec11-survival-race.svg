<svg width="560" height="170" viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="170" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- header -->
  <text x="20" y="20" font-size="11" font-weight="700" fill="#374151">SURVIVAL RACE BARS — Bar width = family's living descendant count (relative to largest)</text>

  <!-- max label -->
  <text x="540" y="37" font-size="9" fill="#9ca3af" text-anchor="end">← 100%</text>
  <!-- bar track bg width: from x=100 to x=538 = 438px -->

  <!-- Tank (green) — 100% (156 descendants) -->
  <text x="95"  y="51" font-size="10" font-weight="600" fill="#15803d" text-anchor="end">Tank</text>
  <rect x="100" y="39" width="438" height="18" rx="4" fill="#f0fdf4"/><!-- track -->
  <rect x="100" y="39" width="438" height="18" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="545" y="52" font-size="9" fill="#15803d">156  · 89%</text>

  <!-- Rusty (blue) — 75% (117 descendants) -->
  <text x="95"  y="76" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="end">Rusty</text>
  <rect x="100" y="64" width="438" height="18" rx="4" fill="#eff6ff"/>
  <rect x="100" y="64" width="328" height="18" rx="4" fill="#3b82f6" opacity="0.85"/>
  <text x="434" y="77" font-size="9" fill="#1d4ed8">117  · 69%</text>

  <!-- Patches (yellow) — 22% (34 descendants) -->
  <text x="95"  y="101" font-size="10" font-weight="600" fill="#a16207" text-anchor="end">Patches</text>
  <rect x="100" y="89" width="438" height="18" rx="4" fill="#fefce8"/>
  <rect x="100" y="89" width="96"  height="18" rx="4" fill="#eab308" opacity="0.85"/>
  <text x="203" y="102" font-size="9" fill="#a16207">34  · 52%</text>

  <!-- Scout (orange) — 5% (8 descendants) -->
  <text x="95"  y="126" font-size="10" font-weight="600" fill="#ea580c" text-anchor="end">Scout</text>
  <rect x="100" y="114" width="438" height="18" rx="4" fill="#fff7ed"/>
  <rect x="100" y="114" width="22"  height="18" rx="4" fill="#f97316" opacity="0.85"/>
  <text x="128" y="127" font-size="9" fill="#ea580c">8  · 28%</text>

  <!-- Tiny (red) — EXTINCT -->
  <text x="95"  y="151" font-size="10" font-weight="600" fill="#9ca3af" text-anchor="end" text-decoration="line-through">Tiny</text>
  <rect x="100" y="139" width="438" height="18" rx="4" fill="#f9fafb"/>
  <!-- extinct badge -->
  <rect x="100" y="141" width="56" height="14" rx="3" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="128" y="151" font-size="8" font-weight="700" fill="#dc2626" text-anchor="middle">EXTINCT</text>

  <!-- formula note -->
  <text x="280" y="165" font-size="10" fill="#9ca3af" text-anchor="middle">barWidth = (familyDescendants / maxDescendants) × 100%</text>
</svg>
