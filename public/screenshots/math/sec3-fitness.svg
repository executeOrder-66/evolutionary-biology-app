<svg width="560" height="155" viewBox="0 0 560 155" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="155" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- left panel: before antibiotics -->
  <rect x="10" y="10" width="255" height="135" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="137" y="30" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">Before antibiotics (Gen 1–9)</text>
  <!-- survival chance big -->
  <text x="137" y="62" font-size="11" fill="#6b7280" text-anchor="middle">Survival Chance</text>
  <text x="137" y="88" font-size="36" font-weight="800" fill="#15803d" text-anchor="middle">97%</text>
  <!-- per-family bars (all roughly equal) -->
  <rect x="20" y="100" width="90" height="7" rx="3" fill="#ef4444" opacity="0.7"/>
  <rect x="20" y="111" width="88" height="7" rx="3" fill="#f97316" opacity="0.7"/>
  <rect x="20" y="122" width="92" height="7" rx="3" fill="#eab308" opacity="0.7"/>
  <rect x="20" y="133" width="89" height="7" rx="3" fill="#3b82f6" opacity="0.7"/>
  <rect x="20" y="100" width="220" height="44" rx="3" fill="none"/>
  <text x="118" y="107" font-size="8" fill="#9ca3af">all families near equal</text>

  <!-- right panel: after antibiotics -->
  <rect x="295" y="10" width="255" height="135" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
  <text x="422" y="30" font-size="11" font-weight="700" fill="#be123c" text-anchor="middle">After antibiotics (Gen 10+)</text>
  <!-- survival chance big -->
  <text x="422" y="62" font-size="11" fill="#6b7280" text-anchor="middle">Survival Chance</text>
  <text x="422" y="88" font-size="36" font-weight="800" fill="#be123c" text-anchor="middle">28%</text>
  <!-- per-family bars (resistant thriving, non-resistant dying) -->
  <rect x="305" y="100" width="13"  height="7" rx="3" fill="#ef4444"/><!-- Tiny: near zero -->
  <rect x="305" y="111" width="28"  height="7" rx="3" fill="#f97316"/><!-- Scout: low -->
  <rect x="305" y="122" width="118" height="7" rx="3" fill="#eab308"/><!-- Patches: medium -->
  <rect x="305" y="133" width="196" height="7" rx="3" fill="#3b82f6"/><!-- Rusty: good -->
  <!-- Tank (not shown to keep it 4 rows) -->
  <text x="322"  y="107" font-size="8" fill="#9ca3af">Tiny ~2%</text>
  <text x="337"  y="118" font-size="8" fill="#9ca3af">Scout ~15%</text>
  <text x="427"  y="129" font-size="8" fill="#9ca3af">Patches ~78%</text>
  <text x="505"  y="140" font-size="8" fill="#1d4ed8">Rusty ~98%</text>

  <!-- divider arrow -->
  <line x1="265" y1="77" x2="295" y2="77" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
