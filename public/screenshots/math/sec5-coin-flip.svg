<svg width="560" height="160" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="160" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- title -->
  <text x="280" y="22" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">FAMILY TREE — Each node faces a survival coin flip every generation</text>

  <!-- Gen N label -->
  <text x="14" y="55" font-size="9" fill="#9ca3af" transform="rotate(-90,14,55) translate(-20,0)">Gen N</text>
  <!-- Gen N+1 label -->
  <text x="14" y="120" font-size="9" fill="#9ca3af" transform="rotate(-90,14,120) translate(-20,0)">Gen N+1</text>

  <!-- Gen N: 4 colored bacteria nodes -->
  <circle cx="120" cy="50" r="10" fill="#ef4444"/><!-- survived this gen -->
  <circle cx="200" cy="50" r="10" fill="#3b82f6"/>
  <circle cx="330" cy="50" r="10" fill="#22c55e"/>
  <circle cx="440" cy="50" r="10" fill="#3b82f6"/>

  <!-- coin flip lines from each -->
  <!-- node 1 (red): dies -->
  <line x1="120" y1="60" x2="120" y2="100" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- node 2 (blue): survives -->
  <line x1="200" y1="60" x2="200" y2="100" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- node 3 (green): survives -->
  <line x1="330" y1="60" x2="330" y2="100" stroke="#22c55e" stroke-width="1.5"/>
  <!-- node 4 (blue): dies -->
  <line x1="440" y1="60" x2="440" y2="100" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Gen N+1: 2 alive, 2 dead -->
  <!-- dead: gray circle with X -->
  <circle cx="120" cy="113" r="10" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="114" y1="107" x2="126" y2="119" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <line x1="126" y1="107" x2="114" y2="119" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>

  <!-- alive: colored -->
  <circle cx="200" cy="113" r="10" fill="#3b82f6"/>
  <circle cx="330" cy="113" r="10" fill="#22c55e"/>

  <!-- dead: gray X -->
  <circle cx="440" cy="113" r="10" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="434" y1="107" x2="446" y2="119" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <line x1="446" y1="107" x2="434" y2="119" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>

  <!-- annotations -->
  <rect x="95" y="130" width="50" height="18" rx="4" fill="#fef2f2"/>
  <text x="120" y="143" font-size="9" fill="#dc2626" text-anchor="middle">Failed flip</text>
  <rect x="175" y="130" width="50" height="18" rx="4" fill="#eff6ff"/>
  <text x="200" y="143" font-size="9" fill="#1d4ed8" text-anchor="middle">Survived</text>
  <rect x="305" y="130" width="50" height="18" rx="4" fill="#f0fdf4"/>
  <text x="330" y="143" font-size="9" fill="#15803d" text-anchor="middle">Survived</text>
  <rect x="415" y="130" width="50" height="18" rx="4" fill="#fef2f2"/>
  <text x="440" y="143" font-size="9" fill="#dc2626" text-anchor="middle">Failed flip</text>

  <!-- fitness label -->
  <text x="280" y="155" font-size="10" fill="#9ca3af" text-anchor="middle">Fitness = probability of passing the flip (e.g. fitness 0.85 → 85% chance of surviving)</text>
</svg>
