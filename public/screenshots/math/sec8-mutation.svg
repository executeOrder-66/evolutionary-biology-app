<svg width="560" height="128" viewBox="0 0 560 128" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="128" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- title -->
  <text x="20" y="20" font-size="11" font-weight="700" fill="#374151">SURVIVAL RACE — Average resistance per family stays stable (mutations are tiny ±0.03)</text>
  <!-- 3 snapshot columns: Gen 1, Gen 10, Gen 30 -->
  <!-- gen labels -->
  <text x="112" y="36" font-size="10" fill="#9ca3af" text-anchor="middle">Gen 1</text>
  <text x="280" y="36" font-size="10" fill="#9ca3af" text-anchor="middle">Gen 10</text>
  <text x="448" y="36" font-size="10" fill="#9ca3af" text-anchor="middle">Gen 30</text>
  <!-- vertical dividers -->
  <line x1="196" y1="30" x2="196" y2="118" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="364" y1="30" x2="364" y2="118" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Family bars (gen 1) -->
  <!-- Tank (green) -->
  <rect x="20"  y="44" width="150" height="9" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="175" y="52" font-size="9" fill="#9ca3af">avg 89%</text>
  <!-- Rusty (blue) -->
  <rect x="20"  y="60" width="130" height="9" rx="4" fill="#3b82f6" opacity="0.85"/>
  <text x="155" y="68" font-size="9" fill="#9ca3af">avg 69%</text>
  <!-- Patches (yellow) -->
  <rect x="20"  y="76" width="110" height="9" rx="4" fill="#eab308" opacity="0.85"/>
  <text x="135" y="84" font-size="9" fill="#9ca3af">avg 49%</text>
  <!-- Scout (orange) -->
  <rect x="20"  y="92" width="90"  height="9" rx="4" fill="#f97316" opacity="0.85"/>
  <text x="115" y="100" font-size="9" fill="#9ca3af">avg 29%</text>

  <!-- Family bars (gen 10) — same lengths, same labels -->
  <rect x="204" y="44" width="150" height="9" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="358" y="52" font-size="9" fill="#9ca3af">avg 89%</text>
  <rect x="204" y="60" width="130" height="9" rx="4" fill="#3b82f6" opacity="0.85"/>
  <text x="338" y="68" font-size="9" fill="#9ca3af">avg 69%</text>
  <rect x="204" y="76" width="110" height="9" rx="4" fill="#eab308" opacity="0.85"/>
  <text x="318" y="84" font-size="9" fill="#9ca3af">avg 49%</text>
  <rect x="204" y="92" width="90"  height="9" rx="4" fill="#f97316" opacity="0.85"/>
  <text x="298" y="100" font-size="9" fill="#9ca3af">avg 29%</text>

  <!-- Family bars (gen 30) — same lengths (mutation barely changes them) -->
  <rect x="372" y="44" width="152" height="9" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="526" y="52" font-size="9" fill="#9ca3af">avg 89%</text>
  <rect x="372" y="60" width="131" height="9" rx="4" fill="#3b82f6" opacity="0.85"/>
  <text x="506" y="68" font-size="9" fill="#9ca3af">avg 69%</text>
  <rect x="372" y="76" width="108" height="9" rx="4" fill="#eab308" opacity="0.85"/>
  <text x="483" y="84" font-size="9" fill="#9ca3af">avg 50%</text>
  <rect x="372" y="92" width="88"  height="9" rx="4" fill="#f97316" opacity="0.85"/>
  <text x="463" y="100" font-size="9" fill="#9ca3af">avg 28%</text>

  <!-- stable arrows -->
  <line x1="196" y1="49" x2="204" y2="49" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="364" y1="49" x2="372" y2="49" stroke="#22c55e" stroke-width="1.5"/>

  <!-- footer note -->
  <text x="280" y="118" font-size="10" fill="#9ca3af" text-anchor="middle">Resistance per family stays nearly constant — mutation shifts it by at most ±0.03 per generation</text>
</svg>
